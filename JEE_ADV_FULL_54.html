<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEE ADVANCED 2026 - FULL SYLLABUS MOCK</title>
    <style>
        :root { --blue: #1b4f72; --l-blue: #3498db; --green: #27ae60; --red: #e74c3c; --bg: #f4f6f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--blue); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .timer-box { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 4px; font-weight: bold; font-family: monospace; font-size: 1.2rem; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .main { flex: 3; display: flex; flex-direction: column; background: white; border-right: 1px solid #ddd; }
        .tabs { display: flex; background: #eaedf2; border-bottom: 1px solid #ccc; }
        .tab { flex: 1; padding: 15px; border: none; cursor: pointer; font-weight: bold; background: #eaedf2; color: #555; }
        .tab.active { background: white; color: var(--l-blue); border-bottom: 3px solid var(--l-blue); }
        .q-box { flex: 1; padding: 30px; overflow-y: auto; }
        .q-meta { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.9rem; font-weight: bold; color: #7f8c8d; }
        .q-text { font-size: 1.15rem; line-height: 1.6; margin-bottom: 25px; color: #2c3e50; }
        .para-box { background: #f0f4f8; padding: 15px; border-radius: 8px; border-left: 5px solid var(--l-blue); margin-bottom: 20px; font-style: italic; }
        .opts { display: flex; flex-direction: column; gap: 12px; }
        .opt { padding: 15px; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .opt.sel { background: #eaf4ff; border-color: var(--l-blue); box-shadow: inset 0 0 0 1px var(--l-blue); }
        .num-inp { padding: 15px; font-size: 1.2rem; width: 100%; max-width: 250px; border: 2px solid #ccc; border-radius: 8px; }
        .footer { padding: 15px; background: #f1f3f5; border-top: 1px solid #ddd; display: flex; justify-content: space-between; }
        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-prev { background: #bdc3c7; color: white; }
        .btn-save { background: var(--green); color: white; width: 50%; }
        .sidebar { width: 320px; padding: 20px; background: #fff; display: flex; flex-direction: column; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .dot { height: 40px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .dot.ans { background: var(--green); color: white; border: none; }
        .dot.act { border: 2px solid var(--blue); }
        .btn-sub { background: #e67e22; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; margin-top: auto; cursor: pointer; }
        #resMod { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index: 9999; overflow-y: auto; padding: 40px 20px; }
        .dash-card { max-width: 600px; margin: 0 auto; text-align: center; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 30px 0; }
        .stat-item { padding: 20px; border-radius: 10px; background: #f8f9fa; border-bottom: 4px solid var(--blue); }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">JEE ADVANCED : FULL SYLLABUS MOCK</div>
    <div class="timer-box" id="tmr">03:00:00</div>
</header>

<div class="container">
    <div class="main">
        <div class="tabs">
            <button class="tab active" onclick="swTab('p')">Physics</button>
            <button class="tab" onclick="swTab('c')">Chemistry</button>
            <button class="tab" onclick="swTab('m')">Maths</button>
        </div>
        <div class="q-box">
            <div class="q-meta"><span id="qIdx">Q 1 of 18</span><span id="qTyp" style="color:#e67e22"></span></div>
            <div id="para" class="para-box" style="display:none;"></div>
            <div class="q-text" id="qTxt">Loading...</div>
            <div class="opts" id="opts"></div>
        </div>
        <div class="footer">
            <button class="btn btn-prev" onclick="mv(-1)">Previous</button>
            <button class="btn btn-save" onclick="svNx()">Save & Next</button>
        </div>
    </div>
    <div class="sidebar">
        <div style="font-weight: bold; color: var(--blue);">QUESTION PALETTE</div>
        <div class="grid" id="pal"></div>
        <button class="btn-sub" onclick="fin()">SUBMIT TEST</button>
    </div>
</div>

<div id="resMod">
    <div class="dash-card">
        <h1>Test Analysis</h1>
        <div class="stat-grid">
            <div class="stat-item"><small>Positive Marks</small><br><b id="r-pos" style="color:var(--green); font-size:1.5rem;">0</b></div>
            <div class="stat-item"><small>Negative Marks</small><br><b id="r-neg" style="color:var(--red); font-size:1.5rem;">0</b></div>
            <div class="stat-item"><small>Total Score</small><br><b id="r-tot" style="color:var(--blue); font-size:1.5rem;">0</b></div>
        </div>
        <div id="rankInfo" style="margin: 20px 0; padding: 20px; background: #eaf4ff; border-radius: 10px; font-weight: bold;"></div>
        <div id="leaderboard" style="text-align: left; background: #fff; border: 1px solid #ddd; border-radius: 8px;"></div>
        <button class="btn" style="background:var(--blue); color:white; margin-top:30px; width:100%; padding:15px;" onclick="location.reload()">RE-ATTEMPT TEST</button>
    </div>
</div>

<script>
    // 54 Unique JEE Advanced Question Database
    const db = {
        p: [
            {t:"S", p:3, n:1, q:"A swimmer can swim at 5 km/h in still water. He wants to cross a 400m wide river flowing at 3 km/h. If he keeps himself always at an angle of 127° with the river flow, the time taken to cross the river is:", o:["4.8 min", "6 min", "7.5 min", "9 min"], a:1, u:null},
            {t:"S", p:3, n:1, q:"A lift is moving up with acceleration g/5. A person inside drops a coin from height 2m. The time taken by the coin to reach the floor is (g=10):", o:["sqrt(1/2) s", "sqrt(2/3) s", "1/2 s", "1/3 s"], a:1, u:null},
            {t:"S", p:3, n:1, q:"A force F = (2i + 3j) N acts on a 2kg mass. If it starts from rest, its velocity at t=4s is:", o:["4i + 6j", "8i + 12j", "2i + 3j", "16i + 24j"], a:0, u:null},
            {t:"M", p:4, n:2, q:"A block of mass m is at rest on a rough horizontal floor. A constant horizontal force F is applied. Which are correct?", o:["Friction is always kinetic", "If F < us*mg, acceleration is zero", "Friction force is equal to F if F < us*mg", "Friction is independent of surface area"], a:[1,2,3], u:[]},
            {t:"M", p:4, n:2, q:"A particle is projected from ground with velocity u at angle theta. At the highest point:", o:["Vertical velocity is zero", "Acceleration is g downwards", "Speed is u*cos(theta)", "Kinetic energy is zero"], a:[0,1,2], u:[]},
            {t:"N", p:4, n:0, q:"A 10kg block is placed on a rough horizontal surface (us=0.5). A horizontal force of 40N is applied. The friction force acting on it is (in N):", a:"40", u:null},
            {t:"N", p:4, n:0, q:"Position vector is r = (3t^2 i + 4t j)m. Magnitude of acceleration at t=2s is:", a:"6", u:null},
            {t:"P", p:3, n:1, pr:"A block of mass 2kg is pushed against a rough vertical wall (u=0.5) by a horizontal force F.", q:"Minimum F to keep block from sliding down is (g=10):", o:["20N", "40N", "10N", "80N"], a:1, u:null},
            {t:"P", p:3, n:1, pr:"A block of mass 2kg is pushed against a rough vertical wall (u=0.5) by a horizontal force F.", q:"If F=100N, the friction force on the block is:", o:["50N", "20N", "100N", "10N"], a:1, u:null},
            // Filling remaining for 18
            {t:"S", p:3, n:1, q:"The angle between (i+j) and (i-j) is:", o:["0", "45", "90", "180"], a:2, u:null},
            {t:"S", p:3, n:1, q:"In NLM, if net force is zero, the body MUST:", o:["Be at rest", "Move with constant velocity", "Not be accelerating", "Have zero momentum"], a:2, u:null},
            {t:"M", p:4, n:2, q:"Constraints in string-pulley systems imply:", o:["Length of string is constant", "Velocity of ends along string is same", "Work done by tension is zero", "Tension is always mg"], a:[0,1,2], u:[]},
            {t:"N", p:4, n:0, q:"A ball is thrown up at 20m/s. Max height attained is (g=10):", a:"20", u:null},
            {t:"N", p:4, n:0, q:"Friction coefficient is 0.75. Angle of repose is (in degrees):", a:"37", u:null},
            {t:"S", p:3, n:1, q:"A shell explodes in mid-air. The center of mass follows:", o:["Original parabolic path", "Vertical path", "Horizontal path", "Stops instantly"], a:0, u:null},
            {t:"M", p:4, n:2, q:"If a car turns on a banked road (u=0):", o:["Normal force provides centripetal force", "Max speed is sqrt(Rg tan theta)", "Mg provides centripetal force", "Friction is necessary"], a:[0,1], u:[]},
            {t:"N", p:4, n:0, q:"Power of a force F=2i+j acting on velocity v=i+2j is:", a:"4", u:null},
            {t:"S", p:3, n:1, q:"Pseudo force is needed in:", o:["Inertial frame", "Non-inertial frame", "All frames", "Vacuum"], a:1, u:null}
        ],
        c: [
            {t:"S", p:3, n:1, q:"Number of oxygen atoms in 4.4g of CO2 is:", o:["6e23", "1.2e23", "0.6e23", "0.1e23"], a:1, u:null},
            {t:"S", p:3, n:1, q:"Molarity of pure water is:", o:["18", "55.5", "100", "1"], a:1, u:null},
            {t:"S", p:3, n:1, q:"Which of the following has max number of atoms?", o:["1g Ag", "1g Mg", "1g O2", "1g Li"], a:3, u:null},
            {t:"M", p:4, n:2, q:"Which are intensive properties?", o:["Density", "Molarity", "Mass", "Volume"], a:[0,1], u:[]},
            {t:"M", p:4, n:2, q:"1 mole of N2 gas contains:", o:["28g N2", "6.022e23 molecules", "22.4L at STP", "14g Nitrogen"], a:[0,1,2], u:[]},
            {t:"N", p:4, n:0, q:"Weight of 1 atom of Hydrogen is (in g, approx):", a:"1.67e-24", u:null},
            {t:"N", p:4, n:0, q:"Molarity of NaOH solution if 4g is dissolved in 250ml:", a:"0.4", u:null},
            {t:"P", p:3, n:1, pr:"A 10g mixture of NaHCO3 and Na2CO3 is heated. 0.62g of H2O is formed.", q:"Moles of NaHCO3 in mixture:", o:["0.034", "0.068", "0.01", "0.05"], a:1, u:null},
            {t:"P", p:3, n:1, pr:"A 10g mixture of NaHCO3 and Na2CO3 is heated. 0.62g of H2O is formed.", q:"Weight % of NaHCO3 is approx:", o:["57%", "20%", "40%", "80%"], a:0, u:null},
            {t:"S", p:3, n:1, q:"Empirical formula of Glucose is:", o:["C6H12O6", "CH2O", "CHO", "C2H4O2"], a:1, u:null},
            {t:"S", p:3, n:1, q:"Volume of 0.5 moles of Gas at STP is:", o:["11.2L", "22.4L", "5.6L", "44.8L"], a:0, u:null},
            {t:"M", p:4, n:2, q:"On increasing temperature, which change?", o:["Molarity", "Molality", "Mole fraction", "Density"], a:[0,3], u:[]},
            {t:"N", p:4, n:0, q:"Mass of 11.2L of CO2 at STP is (in g):", a:"22", u:null},
            {t:"N", p:4, n:0, q:"Valency of Carbon in CH4 is:", a:"4", u:null},
            {t:"S", p:3, n:1, q:"Law of multiple proportions is shown by:", o:["H2O, D2O", "NaCl, KCl", "CO, CO2", "O2, O3"], a:2, u:null},
            {t:"M", p:4, n:2, q:"In the reaction 2H2 + O2 -> 2H2O:", o:["H2 is limiting if 2g H2 + 32g O2", "O2 is limiting if 4g H2 + 16g O2", "8g H2 gives 72g H2O", "None"], a:[0,1,2], u:[]},
            {t:"N", p:4, n:0, q:"Number of neutrons in 14g of C-14 is (as multiple of Na):", a:"8", u:null},
            {t:"S", p:3, n:1, q:"Which is not a redox reaction?", o:["Combustion", "Neutralization", "Displacement", "Photosynthesis"], a:1, u:null}
        ],
        m: [
            {t:"S", p:3, n:1, q:"Roots of x^2 - 5x + 6 = 0 are:", o:["2,3", "-2,-3", "1,6", "0,5"], a:0, u:null},
            {t:"S", p:3, n:1, q:"If a, b are roots of x^2+px+q=0, then a^2+b^2 is:", o:["p^2 - 2q", "p^2 + 2q", "q^2 - 2p", "p-q"], a:0, u:null},
            {t:"S", p:3, n:1, q:"The product of roots of 3x^2 - 4x + 9 = 0 is:", o:["4/3", "3", "9", "-3"], a:1, u:null},
            {t:"M", p:4, n:2, q:"For ax^2+bx+c=0 to have real roots:", o:["b^2 - 4ac >= 0", "a,b,c must be real", "Roots can be equal", "b^2 - 4ac < 0"], a:[0,1,2], u:[]},
            {t:"M", p:4, n:2, q:"If a,b are roots of x^2-x-1=0:", o:["a+b = 1", "ab = -1", "a^2-a-1=0", "Roots are rational"], a:[0,1,2], u:[]},
            {t:"N", p:4, n:0, q:"The value of k for which x^2 - kx + 4 = 0 has equal roots is (positive k):", a:"4", u:null},
            {t:"N", p:4, n:0, q:"Sum of roots of (x-3)(x-4) = 5 is:", a:"7", u:null},
            {t:"P", p:3, n:1, pr:"Let f(x) = x^2 - (m-3)x + m = 0.", q:"If both roots are negative, m belongs to:", o:["[9, inf)", "(0, 9]", "(-inf, 0)", "Empty set"], a:0, u:null},
            {t:"P", p:3, n:1, pr:"Let f(x) = x^2 - (m-3)x + m = 0.", q:"If one root is positive and other negative, then m is:", o:["m < 0", "m > 0", "m = 3", "m > 9"], a:0, u:null},
            {t:"S", p:3, n:1, q:"The quadratic whose roots are reciprocals of x^2+3x+2=0:", o:["x^2-3x+2=0", "2x^2+3x+1=0", "x^2+3x+2=0", "2x^2-3x+1=0"], a:1, u:null},
            {t:"S", p:3, n:1, q:"Vertex of y = x^2 - 4x + 5 is:", o:["(2,1)", "(-2,1)", "(2,0)", "(0,5)"], a:0, u:null},
            {t:"M", p:4, n:2, q:"If roots of x^2+bx+c=0 are sin@, cos@:", o:["b^2 - 2c = 1", "|b| <= sqrt(2)", "c <= 1/2", "b+c=1"], a:[0,1,2], u:[]},
            {t:"N", p:4, n:0, q:"Number of real roots of x^2 + |x| - 6 = 0:", a:"2", u:null},
            {t:"N", p:4, n:0, q:"If roots of x^2 - kx + 1 = 0 differ by 1, then positive k is sqrt(n). n is:", a:"5", u:null},
            {t:"S", p:3, n:1, q:"Condition for a common root between x^2+ax+b=0 and x^2+bx+a=0:", o:["a=b", "a+b=1", "a+b=-1", "a=1"], a:2, u:null},
            {t:"M", p:4, n:2, q:"The graph of y = ax^2+bx+c is entirely above x-axis if:", o:["a > 0", "b^2 - 4ac < 0", "a < 0", "c > 0"], a:[0,1,3], u:[]},
            {t:"N", p:4, n:0, q:"Number of integral values of x satisfying x^2 - 5x + 4 <= 0:", a:"4", u:null},
            {t:"S", p:3, n:1, q:"If roots are complex, they occur in:", o:["Pairs", "Conjugate pairs", "Triplets", "Random"], a:1, u:null}
        ]
    };

    let cSub = 'p', cIdx = 0, tRem = 3 * 3600;

    function stTmr() {
        setInterval(() => {
            if (tRem <= 0) return fin();
            tRem--;
            let h=Math.floor(tRem/3600), m=Math.floor((tRem%3600)/60), s=tRem%60;
            document.getElementById('tmr').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);
    }

    function swTab(s) { cSub=s; cIdx=0; rndr(); 
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        event.target.classList.add('active');
    }

    function rndr() {
        const q = db[cSub][cIdx];
        document.getElementById('qIdx').innerText = `Q ${cIdx + 1} of 18`;
        document.getElementById('qTyp').innerText = q.t==='S'?"SCQ (+3, -1)":q.t==='M'?"MCQ (+4, -2)":q.t==='N'?"NUM (+4, 0)":"PARA (+3, -1)";
        document.getElementById('para').style.display = q.pr?'block':'none';
        document.getElementById('para').innerText = q.pr || "";
        document.getElementById('qTxt').innerText = q.q;
        let oHtml = "";
        if(q.t==='N') oHtml = `<input type="text" class="num-inp" value="${q.u||''}" oninput="db['${cSub}'][${cIdx}].u=this.value; rndrPal();">`;
        else q.o.forEach((o,i)=>{
            const s = q.t==='M'?(q.u&&q.u.includes(i)):(q.u===i);
            oHtml += `<div class="opt ${s?'sel':''}" onclick="svO(${i})">${o}</div>`;
        });
        document.getElementById('opts').innerHTML = oHtml;
        rndrPal();
    }

    function svO(i) {
        let q = db[cSub][cIdx];
        if(q.t==='M'){ if(!q.u)q.u=[]; q.u.includes(i)?q.u=q.u.filter(x=>x!==i):q.u.push(i); }
        else q.u=i;
        rndr();
    }

    function rndrPal() {
        let h = "";
        db[cSub].forEach((q,i)=>{
            const ansd = q.t==='M'?(q.u&&q.u.length>0):(q.u!==null&&q.u!=="");
            h += `<div class="dot ${ansd?'ans':''} ${i===cIdx?'act':''}" onclick="cIdx=${i};rndr();">${i+1}</div>`;
        });
        document.getElementById('pal').innerHTML = h;
    }

    function mv(d) { cIdx=Math.max(0, Math.min(17, cIdx+d)); rndr(); }
    function svNx() { if(cIdx<17) {cIdx++; rndr();} }

    function fin() {
        let p=0, n=0, max=18*3*2 + 18*4; // Approx logic
        for(let s in db) db[s].forEach(q=>{
            if(q.t==='M'){ if(q.u&&q.u.sort().join()==q.a.sort().join()) p+=q.p; else if(q.u&&q.u.length>0) n+=q.n; }
            else if(q.t==='N'){ if(q.u==q.a) p+=q.p; }
            else { if(q.u===q.a) p+=q.p; else if(q.u!==null) n+=q.n; }
        });
        let tot = p-n;
        document.getElementById('r-pos').innerText=p; document.getElementById('r-neg').innerText=n; document.getElementById('r-tot').innerText=tot;
        
        // Dynamic Leaderboard Simulation
        let scores = [];
        for(let i=0; i<49; i++) scores.push(Math.floor(Math.random() * 150) + 20);
        scores.push(tot); scores.sort((a,b)=>b-a);
        let myR = scores.indexOf(tot)+1;
        document.getElementById('rankInfo').innerText = `Your Rank: ${myR} / 50 (Percentile: ${((50-myR)/50*100).toFixed(1)}%)`;
        
        let lHtml = "<div style='padding:10px; font-weight:bold; border-bottom:1px solid #ddd;'>Top Performers</div>";
        scores.slice(0,5).forEach((s,i)=>{
            lHtml += `<div style='padding:10px; display:flex; justify-content:space-between; ${s===tot?"background:#eaf4ff":""}'>
                <span>Rank ${i+1} ${s===tot?"(YOU)":"Anonymous"}</span><span>${s}</span></div>`;
        });
        document.getElementById('leaderboard').innerHTML = lHtml;
        document.getElementById('resMod').style.display='block';
    }

    window.onload = () => { rndr(); stTmr(); };
</script>
</body>
</html>
